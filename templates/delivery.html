{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gharwakhari | Product Delivery</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href='{% static "style.css" %}'>
    <style>
        .delivery-section {
            padding: 80px 20px;
            min-height: 60vh;
            background-color: #fcfbf8;
        }

        .delivery-container {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .delivery-header {
            text-align: center;
            font-family: 'Playfair Display', serif;
            margin-bottom: 30px;
            font-size: 2.5rem;
            color: #2c2926;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: 'Lato', sans-serif;
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #c7a17a;
            outline: none;
        }

        .btn-submit {
            background-color: #2c2926;
            color: #fff;
            padding: 15px 30px;
            border: none;
            cursor: pointer;
            border-radius: 30px;
            font-size: 1.1rem;
            width: 100%;
            transition: 0.3s;
            font-family: 'Lato', sans-serif;
        }

        .btn-submit:hover {
            background-color: #c7a17a;
        }

        .order-summary {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .order-summary h4 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #555;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
            font-weight: bold;
            font-size: 1.2rem;
            color: #000;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="container nav-container">
            <a href="{% url 'Ghar' %}" class="logo">Gharwakhari</a>
            <nav class="navbar">
                <ul>
                    <li><a href="{% url 'Ghar' %}">Home</a></li>
                    <li><a href="{% url 'cart' %}">Cart</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="delivery-section">
        <div class="delivery-container">
            <h2 class="delivery-header">Delivery Details</h2>

            <div class="order-summary" id="order-summary">
                <h4>Order Summary</h4>
                <div id="summary-items"></div>
                <div class="summary-total">
                    <span>Total</span>
                    <span id="summary-total-price">₹0</span>
                </div>
            </div>

            <form action="{% url 'submit_delivery' %}" method="POST" id="delivery-form">
                {% csrf_token %}
                <input type="hidden" name="cart_data" id="cart_data_input">

                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" name="phone" required placeholder="Enter your 10-digit phone number">
                </div>
                <div class="form-group">
                    <label for="address">Delivery Address</label>
                    <textarea id="address" name="address" rows="4" required
                        placeholder="Enter your complete delivery address"></textarea>
                </div>
                <button type="submit" class="btn-submit">Confirm Order & Delivery</button>
            </form>
        </div>
    </section>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            let cart = JSON.parse(localStorage.getItem('ghar_cart')) || [];

            // If cart is empty, redirect back to shop
            if (cart.length === 0) {
                alert("Your cart is empty. Please add items before checkout.");
                window.location.href = "{% url 'Ghar' %}#shop";
                return;
            }

            // Populate hidden input
            document.getElementById('cart_data_input').value = JSON.stringify(cart);

            // Populate Order Summary
            const summaryItemsContainer = document.getElementById('summary-items');
            let total = 0;

            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;

                const div = document.createElement('div');
                div.className = 'summary-item';
                div.innerHTML = `
                    <span>${item.name} (x${item.quantity})</span>
                    <span>₹${itemTotal.toLocaleString('en-IN')}</span>
                `;
                summaryItemsContainer.appendChild(div);
            });

            document.getElementById('summary-total-price').textContent = '₹' + total.toLocaleString('en-IN');

            // Clear cart upon successful submission
            document.getElementById('delivery-form').addEventListener('submit', () => {
                setTimeout(() => {
                    localStorage.removeItem('ghar_cart');
                }, 100);
            });
        });
    </script>
</body>

</html>
