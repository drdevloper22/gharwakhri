{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gharwakhari | Cart</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href='{% static "style.css" %}'>
    <style>
        .cart-section {
            padding: 80px 20px;
            min-height: 60vh;
            background-color: #fcfbf8;
        }

        .cart-container {
            max-width: 900px;
            margin: auto;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .cart-header {
            text-align: center;
            font-family: 'Playfair Display', serif;
            margin-bottom: 30px;
            font-size: 2.5rem;
            color: #2c2926;
        }

        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-item-info {
            flex: 1;
            padding: 0 20px;
            text-align: left;
        }

        .cart-item-info h4 {
            font-size: 1.2rem;
            margin-bottom: 5px;
            color: #333;
        }

        .cart-item-info p {
            color: #666;
            font-size: 1rem;
        }

        .cart-item-quantity {
            font-weight: bold;
            background: #f0f0f0;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .cart-item-total {
            font-size: 1.2rem;
            font-weight: bold;
            color: #000;
        }

        .remove-btn {
            color: #d9534f;
            cursor: pointer;
            font-size: 1.2rem;
            border: none;
            background: none;
        }

        .cart-summary {
            margin-top: 30px;
            text-align: right;
        }

        .cart-summary h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .btn-checkout {
            background-color: #2c2926;
            color: #fff;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 30px;
            font-size: 1.1rem;
            display: inline-block;
            transition: 0.3s;
        }

        .btn-checkout:hover {
            background-color: #c7a17a;
        }

        .empty-cart {
            text-align: center;
            color: #777;
            font-size: 1.2rem;
            padding: 40px 0;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="container nav-container">
            <a href="{% url 'Ghar' %}" class="logo">Gharwakhari</a>
            <nav class="navbar">
                <ul>
                    <li><a href="{% url 'Ghar' %}">Home</a></li>
                    <li><a href="{% url 'Ghar' %}#shop">Shop</a></li>
                    <li><a href="{% url 'delivery' %}">Delivery</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="cart-section">
        <div class="cart-container">
            <h2 class="cart-header">Your Shopping Cart</h2>
            <div id="cart-items-container">
                <!-- Items will be injected here by JS -->
            </div>
            <div class="cart-summary" id="cart-summary" style="display: none;">
                <h3>Total: <span id="cart-total">₹0</span></h3>
                <a href="{% url 'delivery' %}" class="btn-checkout">Proceed to Checkout</a>
            </div>
        </div>
    </section>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            let cart = JSON.parse(localStorage.getItem('ghar_cart')) || [];
            const container = document.getElementById('cart-items-container');
            const summary = document.getElementById('cart-summary');
            const totalEl = document.getElementById('cart-total');

            function renderCart() {
                container.innerHTML = '';
                if (cart.length === 0) {
                    container.innerHTML = '<div class="empty-cart">Your cart is currently empty.</div>';
                    summary.style.display = 'none';
                    return;
                }

                let total = 0;
                cart.forEach((item, index) => {
                    const itemTotal = item.price * item.quantity;
                    total += itemTotal;

                    const div = document.createElement('div');
                    div.className = 'cart-item';
                    div.innerHTML = `
                        <img src="${item.image}" alt="${item.name}">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <p>${item.priceText}</p>
                        </div>
                        <div class="cart-item-quantity">Qty: ${item.quantity}</div>
                        <div class="cart-item-total">₹${itemTotal.toLocaleString('en-IN')}</div>
                        <button class="remove-btn" onclick="removeItem(${index})"><i class="fas fa-trash"></i></button>
                    `;
                    container.appendChild(div);
                });

                totalEl.textContent = '₹' + total.toLocaleString('en-IN');
                summary.style.display = 'block';
            }

            window.removeItem = function (index) {
                cart.splice(index, 1);
                localStorage.setItem('ghar_cart', JSON.stringify(cart));
                renderCart();
            };

            renderCart();
        });
    </script>
</body>

</html>
