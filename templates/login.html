{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login | GharWakhri</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href='{% static "login.css" %}?v=1.1'>
</head>

<body>

    <section class="auth-section">
        <div class="auth-box">
            <h1 class="brand-logo">GharWakhri</h1>
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Luxury Living Starts Here</p>

            <form method="POST" action="{% url 'insert_data' %}">
                {% csrf_token %}
                <div class="input-group">
                    <input type="text" name="user" required>
                    <label>Username</label>
                </div>

                <div class="input-group">
                    <input type="password" name="password" required>
                    <label>Password</label>
                </div>

                <div class="input-group">
                    <input type="date" name="date" required>
                    <label>Date of Birth</label>
                </div>

                <div class="auth-options">
                    <label class="remember">
                        <input type="checkbox"> Remember Me
                    </label>
                    <a href="#" class="forgot">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary">Login</button>
            </form>

            <p class="switch-text">
                Don't have an account?
                <a href="signup">Create Account</a>
            </p>
        </div>
    </section>

</body>

</html>
