<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | Gharwakhari</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="container nav-container">
        <a href="index.html" class="logo">Gharwakhari</a>

        <input type="checkbox" id="nav-toggle" class="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-label">
            <span></span>
        </label>

        <nav class="navbar">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </div>
</header>

<!-- CONTACT SECTION -->
<section class="section" style="margin-top:90px;">
    <div class="container">
        <h2 class="section-title">Contact Us</h2>

        <p style="text-align:center; margin-bottom:40px;">
            This is a trial contact page created for practice and learning purpose.
        </p>

        <!-- CONTACT INFO -->
        <div class="grid-3">
            <div class="feature-box">
                <div class="icon">📍</div>
                <h3>Location</h3>
                <p>Ahmedabad, Gujarat, India</p>
            </div>

            <div class="feature-box">
                <div class="icon">📞</div>
                <h3>Phone</h3>
                <p>+91 98765 43210</p>
            </div>

            <div class="feature-box">
                <div class="icon">✉️</div>
                <h3>Email</h3>
                <p>support@gharwakhari.com</p>
            </div>
        </div>
    </div>
</section>

<!-- CONTACT FORM -->
<section class="section bg-cream">
    <div class="container">
        <h2 class="section-title">Send a Message</h2>

        <form style="max-width:600px; margin:0 auto;" onsubmit="event.preventDefault(); alert('Message sent!');">
            <input type="text" placeholder="Your Name" required
                   style="width:100%; padding:12px; margin-bottom:15px;">

            <input type="email" placeholder="Your Email" required
                   style="width:100%; padding:12px; margin-bottom:15px;">

            <textarea placeholder="Your Message" rows="5" required
                      style="width:100%; padding:12px; margin-bottom:20px;"></textarea>

            <button type="submit" class="btn btn-primary">
                Send Message
            </button>
        </form>
    </div>
</section>

<!-- FOOTER -->
<footer class="footer">
    <div class="container">
        <div class="footer-bottom">
            <p>&copy; 2023 Gharwakhari. All rights reserved.</p>
        </div>
    </div>
</footer>

</body>
</html>
